# XcodeGen spec for Murmur.app — the native Hub (M1).
# Regenerate the .xcodeproj with:  cd Murmur && xcodegen generate
# The generated Murmur.xcodeproj is gitignored; this file is the source of truth.
name: Murmur
options:
  bundleIdPrefix: app.murmur
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    # Ad-hoc local signing — no Apple Developer account needed for the read-only
    # Hub. Developer ID + notarization arrive with the engine port (M4/M7).
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"
    DEVELOPMENT_TEAM: ""
    ENABLE_HARDENED_RUNTIME: NO

targets:
  Murmur:
    type: application
    platform: macOS
    sources:
      - path: Sources
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_NAME: Murmur
        PRODUCT_BUNDLE_IDENTIFIER: app.murmur.hub
        INFOPLIST_KEY_NSHumanReadableCopyright: "© 2026 Abhi Ram Salammagari · MIT"
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.productivity"
        INFOPLIST_KEY_CFBundleDisplayName: Murmur
        ENABLE_PREVIEWS: YES
    dependencies:
      - sdk: libsqlite3.tbd

  MurmurTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: app.murmur.hub.tests
    dependencies:
      - target: Murmur
      - sdk: libsqlite3.tbd

schemes:
  Murmur:
    build:
      targets:
        Murmur: all
        MurmurTests: [test]
    run:
      config: Debug
    test:
      targets:
        - MurmurTests
