name: Feature request
description: Suggest an idea or improvement for Pomvox
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea! Pomvox has one hard constraint worth keeping in
        mind: **local-first is the product.** Your voice and transcripts never
        leave the machine. Any new network feature must be off by default,
        anonymous, content-free, and disclosed in-app (see
        [CONTRIBUTING.md](https://github.com/abhiram304/pomvox/blob/main/CONTRIBUTING.md)).
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: What are you trying to do that's hard or impossible today?
      placeholder: When I dictate into <app>, I keep wanting to…
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like Pomvox to do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches, workarounds, or prior art you've thought about.
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and this isn't a duplicate.
          required: true
        - label: This request keeps voice and transcripts on-device (or, if it touches the network, meets the off-by-default / anonymous / content-free bar).
          required: true
