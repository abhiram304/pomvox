# Murmur configuration.
# Copy to ~/.murmur/config.toml — every key is optional and defaults to the
# values shown here.

[hotkey]
ptt = "fn"           # hold to talk; use "right_option" if Fn proves flaky
toggle = "fn+space"  # hands-free: start recording
stop = ""            # optional extra stop key; fn tap / fn+space always stop
cancel = "esc"       # discard the utterance (nothing inserts); "" disables

[stt]
model = "mlx-community/parakeet-tdt-0.6b-v3"

[cleanup]
enabled = true
model = "mlx-community/Qwen3-4B-4bit"
style = "polish"  # "light" = fillers/punctuation only; "polish" also smooths rambles
timeout_s = 5.0   # hard deadline; on timeout the raw transcript is inserted

[insert]
method = "paste"

[log]
file = true  # also write ~/.murmur/murmur.log

[vad]
enabled = true          # hands-free auto-stop on a natural pause
aggressiveness = 2      # webrtcvad mode 0-3 (3 = strictest about non-speech)
silence_ms = 1200       # pause length that ends the utterance
min_speech_ms = 250     # debounce before "speech started"
energy_gate_dbfs = -45.0 # frames quieter than this never count as speech
max_session_s = 600.0   # hard stop for a forgotten open mic

[history]
enabled = true      # local only, transcripts only — audio is never stored
retention_days = 7  # auto-delete window; 0 = keep nothing

[hud]
enabled = true
show_draft = true          # false keeps live text out of screen shares
position = "bottom-center" # or "top-center"
max_chars = 120
sounds = true              # start/stop cues for eyes-off dictation
