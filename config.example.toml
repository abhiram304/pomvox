# Pomvox configuration.
# Copy to ~/.pomvox/config.toml — every key is optional and defaults to the
# values shown here.
#
# Privacy: your voice and transcripts never leave this Mac. The only network
# calls are the one-time model download (Hugging Face) and — only if you opt in —
# anonymous, content-free usage stats (off by default). That toggle lives in the
# native app (Settings → Privacy), not in this file, and the Python engine makes
# no network calls at all.

[hotkey]
ptt = "fn"           # hold to talk; use "right_option" if Fn proves flaky
toggle = "fn+space"  # hands-free: start recording
stop = ""            # optional extra stop key; fn tap / fn+space always stop
cancel = "esc"       # discard the utterance (nothing inserts); "" disables

[stt]
# Speech model. The native engine loads the matching FluidAudio Parakeet TDT
# 0.6b weights on the Neural Engine; "…-v3" (default) or "…-v2" are supported,
# and an unrecognized value falls back to v3. Restart required to change.
model = "mlx-community/parakeet-tdt-0.6b-v3"

[cleanup]
# LLM cleanup adds ~2.3 GB while armed. On a fresh install on a low-memory Mac
# (<= 8 GB, e.g. an 8 GB MacBook) the native engine defaults this to off so raw
# dictation works without swapping — set it here to override. Existing configs
# are never changed automatically.
enabled = true
model = "mlx-community/Qwen3-4B-4bit"
style = "polish"  # "light" = fillers/punctuation only; "polish" also smooths rambles
timeout_s = 5.0   # hard deadline; on timeout the raw transcript is inserted
# Cleanup loads lazily so it never blocks startup: STT (small, always used)
# loads eagerly, but the ~2.3 GB cleanup LLM loads on first use or this many
# seconds after arm — whichever comes first (0 = only on first use).
preload_delay_s = 20.0
# Evict the cleanup LLM from memory after this many idle seconds; it reloads on
# next use so it isn't resident 24/7 for bursty use (0 = never evict).
idle_evict_s = 300.0

[insert]
method = "paste"

[engine]
native = false  # the native Swift app's dictation engine. The app owns this
                # toggle (Settings → Native engine); the Python engine ignores it.

[log]
file = true  # also write ~/.pomvox/pomvox.log

[vad]
enabled = true          # hands-free auto-stop on a natural pause
aggressiveness = 2      # webrtcvad mode 0-3 (Python engine only; the native app
                        # uses the energy gate below)
silence_ms = 2000       # pause length that ends the utterance
min_speech_ms = 250     # debounce before "speech started"
energy_gate_dbfs = -45.0 # frames quieter than this never count as speech
max_session_s = 600.0   # hard stop for a forgotten open mic

[history]
enabled = true      # local only, transcripts only — audio is never stored
retention_days = 7  # auto-delete window; 0 = keep nothing

[audio]
device = ""  # input mic by name; "" = system default. Wrong mic? Pick it here
             # (Hub: Settings → Voice). Restart required to switch devices.

[hud]
enabled = true
show_draft = true          # false keeps live text out of screen shares
position = "bottom-center" # or "top-center" / "notch" (blends into the MacBook notch)
max_chars = 120
sounds = true              # start/stop cues for eyes-off dictation

[dictionary]
enabled = true
# `words`: proper nouns / jargon the LLM should spell your way. Injected into
# the cleanup prompt (restart required to change). Example:
# words = ["Salammagari", "parakeet-mlx", "MLX", "Pomvox"]
#
# `replacements`: literal misheard → correct fixups applied to the final text,
# even when cleanup is off or times out (hot-applies on save). Whole-word,
# case-insensitive. Example:
# [dictionary.replacements]
# "salam mcgarry" = "Salammagari"
# "para keet" = "parakeet"
